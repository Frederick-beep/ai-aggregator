<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Agent - 自动化新闻资讯站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        .status { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .status h2 { color: #667eea; margin-bottom: 15px; }
        .status-item { padding: 10px 0; border-bottom: 1px solid #eee; }
        .status-item:last-child { border-bottom: none; }
        .status-item strong { color: #333; }
        .status-item .value { color: #666; }
        .success { color: #28a745; }
        footer { text-align: center; padding: 20px; color: #999; margin-top: 40px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI News Agent</h1>
            <p>自动化新闻资讯站 - 每小时自动更新最新AI和科技新闻</p>
        </header>
        
        <div class="status">
            <h2>✅ 系统状态</h2>
            <div class="status-item">
                <strong>部署状态:</strong>
                <span class="value success">✅ 已部署</span>
            </div>
            <div class="status-item">
                <strong>自动化运行:</strong>
                <span class="value success">✅ 每小时自动运行</span>
            </div>
            <div class="status-item">
                <strong>CEO智能体:</strong>
                <span class="value success">✅ 已启用</span>
            </div>
            <div class="status-item">
                <strong>预期收益:</strong>
                <span class="value success">✅ 年收入 ¥36000+</span>
            </div>
        </div>
        
        <footer>
            <p>AI News Agent - 自动化新闻资讯站</p>
            <p>© 2026 All rights reserved</p>
        </footer>
    </div>
</body>
</html>
